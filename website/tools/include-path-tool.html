<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Include Path Tool</title>
  <link rel="icon" type="image/x-icon" href="../wheel.ico">
  <script src="../js/utilities/nav.js"></script>  

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #131316;
      --bg-tertiary: #1a1a1f;
      --bg-hover: #222228;
      --border: #2a2a32;
      --border-focus: #4a4a55;
      --text-primary: #e8e8ec;
      --text-secondary: #9898a4;
      --text-muted: #5a5a66;
      --accent: #f59e0b;
      --accent-dim: #b45309;
      --success: #22c55e;
      --success-dim: rgba(34, 197, 94, 0.15);
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.15);
      --warning: #eab308;
      --warning-dim: rgba(234, 179, 8, 0.15);
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Space Grotesk', sans-serif;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }

    .indented {
      margin-left:80px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    h1 span { color: var(--accent); }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }

    .stat-badge.ok { color: var(--success); border-color: rgba(34,197,94,0.3); }
    .stat-badge.broken { color: var(--danger); border-color: rgba(239,68,68,0.3); }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    main {
      display: grid;
      grid-template-columns: 240px 1fr 1fr;
      overflow: hidden;
    }

    /* Panels */
    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .count {
      background: var(--bg-tertiary);
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }

    .panel-tabs {
      display: flex;
      gap: 0.25rem;
    }

    .panel-tab {
      background: none;
      border: none;
      padding: 0.2rem 0.5rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .panel-tab:hover {
      color: var(--text-secondary);
      background: var(--bg-tertiary);
    }

    .panel-tab.active {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .filter-row {
      display: flex;
      gap: 0.25rem;
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .filter-input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.25rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-primary);
      outline: none;
    }

    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--text-muted); }

    .filter-input.active {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }

    .filter-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
    }

    .filter-clear:hover { color: var(--text-primary); }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    /* Drop Zone */
    .drop-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      border: 2px dashed var(--border);
      margin: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(245, 158, 11, 0.05);
    }

    .drop-zone-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      color: var(--text-muted);
    }

    .drop-zone p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .drop-zone small {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* File List */
    .file-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .file-item:hover { background: var(--bg-hover); }

    .file-item.active {
      background: rgba(245, 158, 11, 0.1);
      border-left: 2px solid var(--accent);
      margin-left: -2px;
    }

    .file-item .filename {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .file-item .filename:hover { color: var(--accent); }

    .file-item .ext {
      color: var(--accent);
      font-size: 0.65rem;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .file-item .ref-counts {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .file-item .ref-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      padding: 0.05rem 0.3rem;
      border-radius: 2px;
    }

    .ref-badge.ok-badge {
      color: var(--success);
      background: var(--success-dim);
    }

    .ref-badge.broken-badge {
      color: var(--danger);
      background: var(--danger-dim);
    }

    /* Reference Items */
    .ref-item {
      padding: 0.55rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      border: 1px solid transparent;
      margin-bottom: 0.25rem;
    }

    .ref-item:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }

    .ref-item.broken {
      border-color: rgba(239, 68, 68, 0.25);
      background: rgba(239, 68, 68, 0.04);
    }

    .ref-source {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ref-source-file {
      cursor: pointer;
      transition: color 0.15s;
    }

    .ref-source-file:hover { color: var(--accent); }

    .ref-type-tag {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      text-transform: uppercase;
      padding: 0.05rem 0.3rem;
      border-radius: 2px;
      background: var(--bg-tertiary);
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .ref-path {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      word-break: break-all;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .ref-path-value { flex: 1; }

    .ref-path-value.ok { color: var(--success); }
    .ref-path-value.broken { color: var(--danger); }

    .ref-status-icon {
      font-size: 0.7rem;
      flex-shrink: 0;
    }

    .ref-line {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* Fix Section */
    .fix-section {
      margin-top: 0.35rem;
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
    }

    .fix-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .fix-candidates {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .fix-candidate {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.4rem;
      border-radius: 3px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      cursor: default;
    }

    .fix-candidate.preferred {
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.06);
    }

    .fix-candidate-path {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-secondary);
      flex: 1;
      word-break: break-all;
    }

    .fix-candidate.preferred .fix-candidate-path {
      color: var(--success);
    }

    .fix-candidate-tag {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      text-transform: uppercase;
      padding: 0.05rem 0.25rem;
      border-radius: 2px;
      background: var(--success-dim);
      color: var(--success);
      flex-shrink: 0;
    }

    .fix-btn {
      padding: 0.2rem 0.45rem;
      font-size: 0.6rem;
      font-family: var(--font-sans);
      font-weight: 500;
      background: var(--accent);
      border: none;
      border-radius: 3px;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .fix-btn:hover { background: var(--accent-dim); }

    .no-candidates {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }

    .btn-danger {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: #dc2626;
      border-color: #dc2626;
    }

    .btn svg { width: 14px; height: 14px; }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      height: 100%;
    }

    /* Preview Modal */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .preview-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .preview-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-header h3 {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .preview-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
    }

    .preview-close:hover { color: var(--text-primary); }

    .preview-content {
      padding: 1rem;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      line-height: 1.6;
      white-space: pre;
    }

    .preview-line { display: flex; }

    .preview-line.highlight {
      background: rgba(245, 158, 11, 0.15);
      margin: 0 -1rem;
      padding: 0 1rem;
    }

    .preview-line-num {
      color: var(--text-muted);
      width: 4ch;
      text-align: right;
      margin-right: 1rem;
      user-select: none;
      flex-shrink: 0;
    }

    .preview-line-text { white-space: pre; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

    /* Status */
    .status {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1 class="indented">Include <span>Path</span> Tool</h1>
      <div class="controls" id="headerControls">
        <button class="btn" id="btnRescan" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Rescan
        </button>
        <button class="btn btn-primary" id="btnFixAll" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Fix All
        </button>
      </div>
    </header>

    <main>
      <!-- Files Panel -->
      <div class="panel" id="filesPanel">
        <div class="panel-header">
          Files
          <span class="count" id="fileCount">0</span>
        </div>
        <div class="panel-content" id="filesContent">
          <div class="drop-zone" id="dropZone">
            <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2Z"/>
            </svg>
            <p>Drop a folder here</p>
            <small>.html, .js, .mjs, .jsx, .ts, .tsx</small>
          </div>
        </div>
      </div>

      <!-- All References Panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-tabs">
            <button class="panel-tab active" data-tab="all">All</button>
            <button class="panel-tab" data-tab="broken">Broken</button>
            <button class="panel-tab" data-tab="ok">Valid</button>
          </div>
          <span class="count" id="refCount">0</span>
        </div>
        <div class="filter-row">
          <input type="text" class="filter-input" id="refFilter" placeholder="filter by path or file...">
          <button class="filter-clear" id="refFilterClear" title="Clear filter">×</button>
        </div>
        <div class="panel-content" id="refsContent">
          <div class="empty-state">Drop a folder to scan includes</div>
        </div>
      </div>

      <!-- Broken Paths Panel (with fix) -->
      <div class="panel">
        <div class="panel-header">
          Broken Paths
          <span class="count" id="brokenCount">0</span>
        </div>
        <div class="panel-content" id="brokenContent">
          <div class="empty-state">Broken references will appear here</div>
        </div>
      </div>
    </main>

    <div class="status" id="status"></div>
  </div>

  <!-- Preview Modal -->
  <div class="preview-overlay" id="previewOverlay">
    <div class="preview-modal">
      <div class="preview-header">
        <h3 id="previewTitle">file.html</h3>
        <button class="preview-close" id="previewClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────────────
    const state = {
      directoryHandle: null,
      // path -> { handle, content, lines }
      allFiles: new Map(),
      // Set of all paths in the tree (any file type)
      allPaths: new Set(),
      // Array of reference objects:
      // { sourceFile, line, rawPath, resolvedPath, type, exists, candidates }
      references: [],
      refTab: 'all',
      refFilterText: '',
      activeFile: null
    };

    // ─────────────────────────────────────────────────────────────
    // DOM
    // ─────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const dom = {
      filesContent: $('filesContent'),
      refsContent: $('refsContent'),
      brokenContent: $('brokenContent'),
      fileCount: $('fileCount'),
      refCount: $('refCount'),
      brokenCount: $('brokenCount'),
      btnRescan: $('btnRescan'),
      btnFixAll: $('btnFixAll'),
      headerControls: $('headerControls'),
      status: $('status'),
      previewOverlay: $('previewOverlay'),
      previewTitle: $('previewTitle'),
      previewContent: $('previewContent'),
      previewClose: $('previewClose')
    };

    // ─────────────────────────────────────────────────────────────
    // Utilities
    // ─────────────────────────────────────────────────────────────
    const escapeHtml = str => str.replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const setStatus = (msg, type = '') => {
      dom.status.textContent = msg;
      dom.status.className = 'status' + (type ? ` ${type}` : '');
    };

    function dirname(path) {
      const i = path.lastIndexOf('/');
      return i === -1 ? '' : path.substring(0, i);
    }

    function basename(path) {
      const i = path.lastIndexOf('/');
      return i === -1 ? path : path.substring(i + 1);
    }

    function normalizePath(path) {
      const parts = [];
      for (const seg of path.split('/')) {
        if (seg === '.' || seg === '') continue;
        if (seg === '..') { parts.pop(); continue; }
        parts.push(seg);
      }
      return parts.join('/');
    }

    function resolvePath(fromFile, relativePath) {
      const dir = dirname(fromFile);
      const combined = dir ? dir + '/' + relativePath : relativePath;
      return normalizePath(combined);
    }

    // Compute relative path from `from` file to `to` file
    function computeRelativePath(fromFile, toFile) {
      const fromDir = dirname(fromFile).split('/').filter(Boolean);
      const toParts = toFile.split('/').filter(Boolean);

      // Find common prefix length
      let common = 0;
      while (common < fromDir.length && common < toParts.length && fromDir[common] === toParts[common]) {
        common++;
      }

      const ups = fromDir.length - common;
      const remainder = toParts.slice(common);

      if (ups === 0) {
        return './' + remainder.join('/');
      }
      return '../'.repeat(ups) + remainder.join('/');
    }

    // ─────────────────────────────────────────────────────────────
    // Path Extraction Patterns
    // ─────────────────────────────────────────────────────────────
    const SCAN_EXTENSIONS = /\.(html|htm|js|mjs|jsx|ts|tsx)$/i;
    const ALL_FILE_EXTENSIONS = /\.[a-zA-Z0-9]+$/;

    // We skip absolute URLs, data URIs, fragment-only, protocol-relative
    function isRelativePath(p) {
      if (!p || p.startsWith('http://') || p.startsWith('https://') || p.startsWith('//')) return false;
      if (p.startsWith('data:') || p.startsWith('blob:') || p.startsWith('javascript:')) return false;
      if (p.startsWith('#') || p.startsWith('mailto:') || p.startsWith('tel:')) return false;
      if (p.startsWith('chrome-extension:') || p.startsWith('moz-extension:')) return false;
      // Skip CDN / npm bare specifiers (no ./ or ../ and no file extension pattern)
      if (!p.startsWith('./') && !p.startsWith('../') && !p.startsWith('/')) {
        // Could be a bare module specifier like 'react', 'lodash/fp'
        // Allow if it looks like a relative file path with extension
        if (!ALL_FILE_EXTENSIONS.test(p.split('?')[0].split('#')[0])) return false;
      }
      return true;
    }

    function cleanPath(raw) {
      // Strip query params and hash
      return raw.split('?')[0].split('#')[0];
    }

    function extractReferences(content, filePath) {
      const results = [];
      const lines = content.split('\n');
      const isHtml = /\.html?$/i.test(filePath);
      const isJs = /\.(js|mjs|jsx|ts|tsx)$/i.test(filePath);

      lines.forEach((line, idx) => {
        const lineNum = idx + 1;
        let matches = [];

        if (isHtml) {
          // src="..." href="..." (not stylesheet-only, catch all)
          const attrRegex = /(?:src|href)\s*=\s*["']([^"']+)["']/gi;
          let m;
          while ((m = attrRegex.exec(line)) !== null) {
            matches.push({ raw: m[1], type: m[0].toLowerCase().startsWith('src') ? 'src' : 'href' });
          }
        }

        if (isJs || isHtml) {
          // import ... from "..."  or  import "..."
          const importRegex = /\bimport\s+(?:[\s\S]*?from\s+)?["']([^"']+)["']/g;
          let m;
          while ((m = importRegex.exec(line)) !== null) {
            matches.push({ raw: m[1], type: 'import' });
          }

          // require("...")
          const requireRegex = /\brequire\s*\(\s*["']([^"']+)["']\s*\)/g;
          while ((m = requireRegex.exec(line)) !== null) {
            matches.push({ raw: m[1], type: 'require' });
          }

          // Dynamic import("...")
          const dynImportRegex = /\bimport\s*\(\s*["']([^"']+)["']\s*\)/g;
          while ((m = dynImportRegex.exec(line)) !== null) {
            matches.push({ raw: m[1], type: 'import()' });
          }
        }

        for (const { raw, type } of matches) {
          if (!isRelativePath(raw)) continue;
          const cleaned = cleanPath(raw);
          if (!cleaned) continue;

          const resolved = resolvePath(filePath, cleaned);

          results.push({
            sourceFile: filePath,
            line: lineNum,
            rawPath: raw,
            cleanPath: cleaned,
            resolvedPath: resolved,
            type,
            exists: false,
            candidates: []
          });
        }
      });

      return results;
    }

    // ─────────────────────────────────────────────────────────────
    // File System
    // ─────────────────────────────────────────────────────────────
    async function readDirectoryAll(dirHandle, path = '') {
      const entries = [];
      for await (const entry of dirHandle.values()) {
        if (entry.name.startsWith('.')) continue;
        if (entry.name === 'node_modules') continue;
        const entryPath = path ? `${path}/${entry.name}` : entry.name;
        if (entry.kind === 'directory') {
          const subEntries = await readDirectoryAll(entry, entryPath);
          entries.push(...subEntries);
        } else {
          entries.push({ handle: entry, path: entryPath, kind: 'file' });
        }
      }
      return entries;
    }

    async function readFileContent(fileHandle) {
      const file = await fileHandle.getFile();
      return await file.text();
    }

    async function writeFileContent(fileHandle, content) {
      const writable = await fileHandle.createWritable();
      await writable.write(content);
      await writable.close();
    }

    // Navigate to a file handle by path from the root directory
    async function getFileHandle(path) {
      const parts = path.split('/');
      let current = state.directoryHandle;
      for (let i = 0; i < parts.length - 1; i++) {
        current = await current.getDirectoryHandle(parts[i]);
      }
      return await current.getFileHandle(parts[parts.length - 1]);
    }

    // ─────────────────────────────────────────────────────────────
    // Scanning
    // ─────────────────────────────────────────────────────────────
    async function scanFiles() {
      if (!state.directoryHandle) return;

      setStatus('Scanning files...');
      state.allFiles.clear();
      state.allPaths.clear();
      state.references = [];

      try {
        const entries = await readDirectoryAll(state.directoryHandle);

        // Collect ALL file paths in tree
        for (const { path } of entries) {
          state.allPaths.add(path);
        }

        // Read scannable files
        for (const { handle, path } of entries) {
          if (!SCAN_EXTENSIONS.test(path)) continue;
          const content = await readFileContent(handle);
          state.allFiles.set(path, {
            handle,
            content,
            lines: content.split('\n')
          });
        }

        // Extract references
        for (const [filePath, fileData] of state.allFiles) {
          const refs = extractReferences(fileData.content, filePath);
          state.references.push(...refs);
        }

        // Resolve existence & find candidates for broken paths
        resolveReferences();

        renderAll();
        dom.btnRescan.disabled = false;
        updateFixAllButton();

        const broken = state.references.filter(r => !r.exists).length;
        const total = state.references.length;
        setStatus(`Scanned ${state.allFiles.size} files — ${total} references, ${broken} broken`, broken > 0 ? 'error' : 'success');
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    function resolveReferences() {
      // Build a map of filename -> [paths] for candidate finding
      const fileNameMap = new Map();
      for (const p of state.allPaths) {
        const name = basename(p);
        if (!fileNameMap.has(name)) fileNameMap.set(name, []);
        fileNameMap.get(name).push(p);
      }

      for (const ref of state.references) {
        // Check direct resolution
        if (state.allPaths.has(ref.resolvedPath)) {
          ref.exists = true;
          ref.candidates = [];
          continue;
        }

        // Try with common implicit extensions for JS imports
        const tryExtensions = ['', '.js', '.mjs', '.jsx', '.ts', '.tsx', '/index.js', '/index.ts', '/index.jsx', '/index.tsx'];
        let found = false;
        for (const ext of tryExtensions) {
          if (ext === '') continue;
          if (state.allPaths.has(ref.resolvedPath + ext)) {
            ref.exists = true;
            ref.candidates = [];
            found = true;
            break;
          }
        }
        if (found) continue;

        // Not found — find candidates by filename
        ref.exists = false;
        const targetName = basename(ref.cleanPath);
        const candidatePaths = fileNameMap.get(targetName) || [];

        // Score candidates: prefer paths below the source file
        const sourceDir = dirname(ref.sourceFile);
        ref.candidates = candidatePaths
          .map(candidatePath => {
            const relPath = computeRelativePath(ref.sourceFile, candidatePath);
            // "Below" means the candidate is inside/under the source file's directory
            const isBelow = candidatePath.startsWith(sourceDir + '/') || sourceDir === '';
            // Distance: count how many ../ needed
            const upCount = (relPath.match(/\.\.\//g) || []).length;
            return { absolutePath: candidatePath, relativePath: relPath, isBelow, upCount };
          })
          .sort((a, b) => {
            // Prefer below over not-below
            if (a.isBelow !== b.isBelow) return a.isBelow ? -1 : 1;
            // Then prefer fewer ups
            return a.upCount - b.upCount;
          });
      }
    }

    function updateFixAllButton() {
      const hasBroken = state.references.some(r => !r.exists && r.candidates.length > 0);
      dom.btnFixAll.disabled = !hasBroken;
    }

    // ─────────────────────────────────────────────────────────────
    // Fixing
    // ─────────────────────────────────────────────────────────────
    async function fixReference(ref, candidateRelPath) {
      const fileData = state.allFiles.get(ref.sourceFile);
      if (!fileData) return;

      // Replace the raw path in the specific line
      const lines = fileData.content.split('\n');
      const lineIdx = ref.line - 1;
      if (lineIdx < 0 || lineIdx >= lines.length) return;

      // Replace first occurrence of the raw path on that line
      const oldLine = lines[lineIdx];
      const newLine = oldLine.replace(ref.rawPath, candidateRelPath);

      if (oldLine === newLine) return;

      lines[lineIdx] = newLine;
      const newContent = lines.join('\n');

      // Write back
      try {
        const handle = await getFileHandle(ref.sourceFile);
        await writeFileContent(handle, newContent);
        fileData.content = newContent;
        fileData.lines = lines;

        // Update reference
        ref.rawPath = candidateRelPath;
        ref.cleanPath = cleanPath(candidateRelPath);
        ref.resolvedPath = resolvePath(ref.sourceFile, ref.cleanPath);
        ref.exists = true;
        ref.candidates = [];

        setStatus(`Fixed: ${ref.sourceFile}:${ref.line}`, 'success');
      } catch (err) {
        setStatus(`Error writing ${ref.sourceFile}: ${err.message}`, 'error');
      }
    }

    async function fixAll() {
      const broken = state.references.filter(r => !r.exists && r.candidates.length > 0);
      if (broken.length === 0) return;

      setStatus(`Fixing ${broken.length} broken paths...`);

      let fixed = 0;
      let errors = 0;

      for (const ref of broken) {
        try {
          await fixReference(ref, ref.candidates[0].relativePath);
          fixed++;
        } catch {
          errors++;
        }
      }

      renderAll();
      updateFixAllButton();
      setStatus(`Fixed ${fixed} paths${errors ? `, ${errors} errors` : ''}`, errors ? 'error' : 'success');
    }

    // ─────────────────────────────────────────────────────────────
    // Rendering
    // ─────────────────────────────────────────────────────────────
    function renderAll() {
      renderFiles();
      renderRefs();
      renderBroken();
      renderHeaderStats();
    }

    function renderHeaderStats() {
      // Remove old stat badges
      dom.headerControls.querySelectorAll('.stat-badge').forEach(el => el.remove());

      const okCount = state.references.filter(r => r.exists).length;
      const brokenCount = state.references.filter(r => !r.exists).length;

      if (state.references.length > 0) {
        const okBadge = document.createElement('div');
        okBadge.className = 'stat-badge ok';
        okBadge.innerHTML = `<span class="stat-dot"></span>${okCount} valid`;
        dom.headerControls.insertBefore(okBadge, dom.btnRescan);

        const brokenBadge = document.createElement('div');
        brokenBadge.className = 'stat-badge broken';
        brokenBadge.innerHTML = `<span class="stat-dot"></span>${brokenCount} broken`;
        dom.headerControls.insertBefore(brokenBadge, dom.btnRescan);
      }
    }

    function renderFiles() {
      if (state.allFiles.size === 0) {
        dom.filesContent.innerHTML = `
          <div class="drop-zone" id="dropZone">
            <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2Z"/>
            </svg>
            <p>Drop a folder here</p>
            <small>.html, .js, .mjs, .jsx, .ts, .tsx</small>
          </div>`;
        setupDropZone();
        return;
      }

      const sorted = [...state.allFiles.keys()].sort();

      dom.filesContent.innerHTML = sorted.map(path => {
        const ext = path.split('.').pop();
        const isActive = path === state.activeFile;
        const refsFromFile = state.references.filter(r => r.sourceFile === path);
        const okCount = refsFromFile.filter(r => r.exists).length;
        const brokenCount = refsFromFile.filter(r => !r.exists).length;

        return `
          <div class="file-item${isActive ? ' active' : ''}" data-path="${escapeHtml(path)}">
            <span class="filename" title="${escapeHtml(path)}">${escapeHtml(path)}</span>
            <span class="ref-counts">
              ${okCount > 0 ? `<span class="ref-badge ok-badge">${okCount}</span>` : ''}
              ${brokenCount > 0 ? `<span class="ref-badge broken-badge">${brokenCount}</span>` : ''}
            </span>
            <span class="ext">${ext}</span>
          </div>`;
      }).join('');

      dom.filesContent.querySelectorAll('.file-item').forEach(el => {
        el.addEventListener('click', () => {
          const path = el.dataset.path;
          if (state.activeFile === path) {
            state.activeFile = null;
            state.refFilterText = '';
          } else {
            state.activeFile = path;
            state.refFilterText = path;
          }
          renderFiles();
          renderRefs();
        });
      });

      dom.fileCount.textContent = state.allFiles.size;
    }

    function getFilteredRefs() {
      let refs = state.references;

      // Tab filter
      if (state.refTab === 'broken') refs = refs.filter(r => !r.exists);
      else if (state.refTab === 'ok') refs = refs.filter(r => r.exists);

      // Text filter
      if (state.refFilterText) {
        const frag = state.refFilterText.toLowerCase();
        refs = refs.filter(r =>
          r.sourceFile.toLowerCase().includes(frag) ||
          r.rawPath.toLowerCase().includes(frag) ||
          r.resolvedPath.toLowerCase().includes(frag)
        );
      }

      return refs;
    }

    function renderRefs() {
      // Update tab UI
      document.querySelectorAll('.panel-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === state.refTab);
      });

      // Update filter
      const filterInput = $('refFilter');
      if (filterInput) {
        filterInput.value = state.refFilterText;
        filterInput.classList.toggle('active', state.refFilterText !== '');
      }

      const refs = getFilteredRefs();

      if (refs.length === 0 && state.references.length === 0) {
        dom.refsContent.innerHTML = '<div class="empty-state">Drop a folder to scan includes</div>';
        dom.refCount.textContent = '0';
        return;
      }

      if (refs.length === 0) {
        dom.refsContent.innerHTML = '<div class="empty-state">No matching references</div>';
        dom.refCount.textContent = '0';
        return;
      }

      dom.refsContent.innerHTML = refs.map((ref, idx) => `
        <div class="ref-item${ref.exists ? '' : ' broken'}">
          <div class="ref-source">
            <span class="ref-source-file" data-file="${escapeHtml(ref.sourceFile)}" data-line="${ref.line}">${escapeHtml(ref.sourceFile)}:${ref.line}</span>
            <span class="ref-type-tag">${escapeHtml(ref.type)}</span>
          </div>
          <div class="ref-path">
            <span class="ref-status-icon">${ref.exists ? '✓' : '✗'}</span>
            <span class="ref-path-value ${ref.exists ? 'ok' : 'broken'}">${escapeHtml(ref.rawPath)}</span>
          </div>
          ${!ref.exists ? `<div class="ref-line">→ resolves to: ${escapeHtml(ref.resolvedPath)}</div>` : ''}
        </div>`
      ).join('');

      dom.refsContent.querySelectorAll('.ref-source-file').forEach(el => {
        el.addEventListener('click', () => showPreview(el.dataset.file, parseInt(el.dataset.line)));
      });

      dom.refCount.textContent = refs.length;
    }

    function renderBroken() {
      const broken = state.references.filter(r => !r.exists);

      if (broken.length === 0 && state.references.length > 0) {
        dom.brokenContent.innerHTML = '<div class="empty-state">No broken paths — all references valid!</div>';
        dom.brokenCount.textContent = '0';
        return;
      }

      if (broken.length === 0) {
        dom.brokenContent.innerHTML = '<div class="empty-state">Broken references will appear here</div>';
        dom.brokenCount.textContent = '0';
        return;
      }

      dom.brokenContent.innerHTML = broken.map((ref, idx) => `
        <div class="ref-item broken" data-ref-idx="${idx}">
          <div class="ref-source">
            <span class="ref-source-file" data-file="${escapeHtml(ref.sourceFile)}" data-line="${ref.line}">${escapeHtml(ref.sourceFile)}:${ref.line}</span>
            <span class="ref-type-tag">${escapeHtml(ref.type)}</span>
          </div>
          <div class="ref-path">
            <span class="ref-status-icon">✗</span>
            <span class="ref-path-value broken">${escapeHtml(ref.rawPath)}</span>
          </div>
          <div class="ref-line">→ resolves to: ${escapeHtml(ref.resolvedPath)}</div>
          <div class="fix-section">
            <div class="fix-label">Candidates (${ref.candidates.length})</div>
            ${ref.candidates.length > 0 ? `
              <div class="fix-candidates">
                ${ref.candidates.map((c, ci) => `
                  <div class="fix-candidate${ci === 0 ? ' preferred' : ''}">
                    <span class="fix-candidate-path">${escapeHtml(c.relativePath)}</span>
                    ${c.isBelow ? '<span class="fix-candidate-tag">below</span>' : ''}
                    ${ci === 0 ? '<span class="fix-candidate-tag">best</span>' : ''}
                    <button class="fix-btn" data-broken-idx="${idx}" data-candidate-idx="${ci}">Fix</button>
                  </div>`
                ).join('')}
              </div>` : '<div class="no-candidates">No files with this name found in tree</div>'}
          </div>
        </div>`
      ).join('');

      // Wire up fix buttons
      dom.brokenContent.querySelectorAll('.fix-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const brokenIdx = parseInt(btn.dataset.brokenIdx);
          const candidateIdx = parseInt(btn.dataset.candidateIdx);
          const brokenRefs = state.references.filter(r => !r.exists);
          const ref = brokenRefs[brokenIdx];
          if (!ref) return;
          const candidate = ref.candidates[candidateIdx];
          if (!candidate) return;

          btn.disabled = true;
          btn.textContent = '...';
          await fixReference(ref, candidate.relativePath);
          renderAll();
          updateFixAllButton();
        });
      });

      dom.brokenContent.querySelectorAll('.ref-source-file').forEach(el => {
        el.addEventListener('click', () => showPreview(el.dataset.file, parseInt(el.dataset.line)));
      });

      dom.brokenCount.textContent = broken.length;
    }

    // ─────────────────────────────────────────────────────────────
    // Preview Modal
    // ─────────────────────────────────────────────────────────────
    function showPreview(filePath, highlightLine) {
      const fileData = state.allFiles.get(filePath);
      if (!fileData) return;

      dom.previewTitle.textContent = filePath;
      const lines = fileData.lines;
      const startLine = Math.max(0, highlightLine - 10);
      const endLine = Math.min(lines.length, highlightLine + 20);

      dom.previewContent.innerHTML = lines.slice(startLine, endLine).map((line, i) => {
        const lineNum = startLine + i + 1;
        const isHighlight = lineNum === highlightLine;
        return `<div class="preview-line${isHighlight ? ' highlight' : ''}"><span class="preview-line-num">${lineNum}</span><span class="preview-line-text">${escapeHtml(line)}</span></div>`;
      }).join('');

      dom.previewOverlay.classList.add('visible');
    }

    function hidePreview() {
      dom.previewOverlay.classList.remove('visible');
    }

    // ─────────────────────────────────────────────────────────────
    // Event Handlers
    // ─────────────────────────────────────────────────────────────
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());

    function setupDropZone() {
      const dropZone = document.getElementById('dropZone');
      if (!dropZone) return;

      const handleDragOver = e => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add('drag-over');
      };

      const handleDragLeave = () => {
        dropZone.classList.remove('drag-over');
      };

      const handleDrop = async e => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove('drag-over');

        const items = e.dataTransfer.items;
        for (const item of items) {
          if (item.kind === 'file') {
            const handle = await item.getAsFileSystemHandle();
            if (handle.kind === 'directory') {
              state.directoryHandle = handle;
              await scanFiles();
              return;
            }
          }
        }
        setStatus('Please drop a folder, not individual files', 'error');
      };

      dropZone.addEventListener('dragover', handleDragOver);
      dropZone.addEventListener('dragleave', handleDragLeave);
      dropZone.addEventListener('drop', handleDrop);
      dropZone.addEventListener('click', async () => {
        try {
          state.directoryHandle = await window.showDirectoryPicker();
          await scanFiles();
        } catch (err) {
          if (err.name !== 'AbortError') {
            setStatus(`Error: ${err.message}`, 'error');
          }
        }
      });
    }

    function setupTabs() {
      document.querySelectorAll('.panel-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          state.refTab = tab.dataset.tab;
          renderRefs();
        });
      });
    }

    function setupFilter() {
      $('refFilter').addEventListener('input', e => {
        state.refFilterText = e.target.value;
        renderRefs();
      });

      $('refFilterClear').addEventListener('click', () => {
        state.refFilterText = '';
        state.activeFile = null;
        renderRefs();
        renderFiles();
      });
    }

    function setupPreview() {
      dom.previewClose.addEventListener('click', hidePreview);
      dom.previewOverlay.addEventListener('click', e => {
        if (e.target === dom.previewOverlay) hidePreview();
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') hidePreview();
      });
    }

    function setupButtons() {
      dom.btnRescan.addEventListener('click', () => scanFiles());
      dom.btnFixAll.addEventListener('click', () => fixAll());
    }

    // ─────────────────────────────────────────────────────────────
    // Initialize
    // ─────────────────────────────────────────────────────────────
    function init() {
      setupDropZone();
      setupTabs();
      setupFilter();
      setupPreview();
      setupButtons();
    }

    init();
  </script>
</body>
</html>
